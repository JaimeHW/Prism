# Prism stdlib module inventory.
#
# `builtin` controls visibility through importlib's builtin importer.
# `native` controls whether Prism ships a native Rust implementation on a
# platform. When `policy` is set and `native` is omitted, native support defaults
# to all platforms.

[[module]]
name = "_abc"
builtin = ["all"]
policy = "prefer_native"

